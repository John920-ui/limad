// ── Service Worker (Offline Cache) ───────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'limad-v1';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll([self.location.pathname]))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    const clone = res.clone();
    caches.open(CACHE).then(c => c.put(e.request, clone));
    return res;
  }).catch(() => caches.match(e.request))));
});
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: './'})
    .then(() => console.log('SW registered'))
    .catch(e => console.log('SW failed (blob SW needs HTTPS):', e));
}

// ── Helpers ──────────────────────────────────────────────────────
function lvlInfo(xp){let l=1,r=xp;while(r>=l*100){r-=l*100;l++;}return{lvl:l,rem:r,need:l*100}}
function calcStreak(){
  let s=0,d=new Date();
  while(true){const k=dk(d);if(ST.logs[k]&&ST.logs[k].length>0){s++;d.setDate(d.getDate()-1);}else if(ST.freezeDates.includes(k)){d.setDate(d.getDate()-1);}else break;}
  return s;
}
function calcLongest(){
  const keys=Object.keys(ST.logs).filter(k=>ST.logs[k]&&ST.logs[k].length>0).sort();
  if(!keys.length)return 0;
  let max=1,cur=1;
  for(let i=1;i<keys.length;i++){
    const[y1,m1,d1]=keys[i-1].split('-').map(Number);
    const[y2,m2,d2]=keys[i].split('-').map(Number);
    const diff=Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/86400000);
    if(diff===1){cur++;max=Math.max(max,cur);}else cur=1;
  }
  return max;
}
function bestMonth(){
  const counts={};
  Object.entries(ST.logs).forEach(([k,v])=>{if(!v||!v.length)return;const[y,m]=k.split('-');const key=`${y}-${m}`;counts[key]=(counts[key]||0)+v.length;});
  const keys=Object.keys(counts);if(!keys.length)return'—';
  const best=keys.reduce((a,b)=>counts[a]>counts[b]?a:b);
  const[y,m]=best.split('-').map(Number);
  return`${(ST.lang==='am'?MONTHS_AM:MONTHS_EN)[m-1]} ${y}`;
}
function compRate(){
  const dates=Object.keys(ST.logs);
  if(!dates.length||!ST.habits.length)return 0;
  const tot=dates.length*ST.habits.length;
  const done=dates.reduce((a,k)=>a+(ST.logs[k]?.length||0),0);
  return Math.round((done/tot)*100);
}
function isScheduledOn(h,d){
  const s=h.schedule;
  if(!s||s.type==='daily')return true;
  const day=d.getDay(); // 0=Sun..6=Sat
  if(s.type==='weekdays')return day>=1&&day<=5;
  if(s.type==='weekends')return day===0||day===6;
  if(s.type==='everyX'){
    const x=Math.max(1,s.x||2);
    const start=h.createdAt?new Date(h.createdAt):d;
    const diff=Math.round((new Date(dk(d)).getTime()-new Date(dk(start)).getTime())/86400000);
    return diff>=0&&diff%x===0;
  }
  return true;
}
function isScheduledToday(h){return isScheduledOn(h,new Date())}
function todayHabits(){return ST.showTodayOnly?ST.habits.filter(isScheduledToday):ST.habits}
function scheduleLabel(h){
  const s=h.schedule;
  if(!s||s.type==='daily')return L('schDaily');
  if(s.type==='weekdays')return L('schWeekdays');
  if(s.type==='weekends')return L('schWeekends');
  if(s.type==='everyX')return`${ST.lang==='am'?'በየ':'every '}${s.x||2}${ST.lang==='am'?' ቀን':' days'}`;
  return'';
}

// ── PDF Report ───────────────────────────────────────────────────
function loadJsPDF(){
  return new Promise((res,rej)=>{
    if(window.jspdf){res();return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>res();s.onerror=()=>rej(new Error('load fail'));
    document.head.appendChild(s);
  });
}
async function generatePdfReport(onDone){
  try{
    await loadJsPDF();
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF();
    const am=ST.lang==='am';
    let y=20;
    doc.setFontSize(20);doc.text('LIMAD - '+(am?'ወርሃዊ ሪፖርት':'Monthly Report'),14,y);y+=10;
    doc.setFontSize(10);doc.setTextColor(120);doc.text(new Date().toLocaleDateString(),14,y);y+=12;
    doc.setTextColor(0);doc.setFontSize(13);
    const rows=[
      [am?'ስም':'Name',ST.profile.name||'-'],
      [am?'ጠቅላላ XP':'Total XP',String(ST.xp)],
      [am?'ደረጃ':'Level',String(lvlInfo(ST.xp).lvl)],
      [am?'የአሁኑ streak':'Current streak',String(calcStreak())],
      [am?'ምርጥ streak':'Best streak',String(calcLongest())],
      [am?'የማጠናቀቅ መጠን':'Completion rate',compRate()+'%'],
      [am?'ልማዶች ብዛት':'Total habits',String(ST.habits.length)],
      [am?'ምርጥ ወር':'Best month',bestMonth()],
    ];
    rows.forEach(([k,v])=>{doc.text(`${k}:`,14,y);doc.text(String(v),100,y);y+=8;});
    y+=4;
    doc.setFontSize(14);doc.text(am?'ልማዶች':'Habits',14,y);y+=8;
    doc.setFontSize(10);
    ST.habits.forEach(h=>{
      if(y>280){doc.addPage();y=20;}
      doc.text(`• ${h.name} (${h.cat||''}) — ${scheduleLabel(h)}`,14,y);y+=7;
    });
    doc.save(`limad-report-${dk()}.pdf`);
    onDone(true);
  }catch(e){onDone(false);}
}

function playDing(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;o.type='sine';
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    o.start();o.stop(ctx.currentTime+0.4);
  }catch{}
}

// ── Render Engine ────────────────────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(children){
    if(!Array.isArray(children))children=[children];
    children.flat(Infinity).forEach(c=>{
      if(c==null||c===false)return;
      e.appendChild(typeof c==='string'?document.createTextNode(c):c);
    });
  }
  return e;
}
function div(attrs,children){return el('div',attrs,children)}
function btn(attrs,children){return el('button',attrs,children)}
function span(attrs,children){return el('span',attrs,children)}
function inp(attrs){return el('input',attrs)}
function txt(attrs,children){return el('textarea',attrs,children)}

const app=document.getElementById('app');
function render(){
  app.innerHTML='';
  applyThemeBody();
  const c=build();
  if(Array.isArray(c))c.forEach(n=>app.appendChild(n));
  else app.appendChild(c);
}

  const t=T();

function buildHeatmap(){
  const t=T();
  const WEEKS=12,DAYSTOT=WEEKS*7;
  const end=new Date();
  const endDow=end.getDay(); // 0=Sun
  const start=new Date(end);start.setDate(start.getDate()-(DAYSTOT-1)-((6-endDow)));
  const cols=[];
  for(let w=0;w<WEEKS+1;w++){
    const col=[];
    for(let dRow=0;dRow<7;dRow++){
      const cellDate=new Date(start);cellDate.setDate(start.getDate()+w*7+dRow);
      if(cellDate>end){col.push(null);continue;}
      const k=dk(cellDate);
      const cnt=(ST.logs[k]||[]).length;
      const pct=ST.habits.length?cnt/ST.habits.length:0;
      col.push({date:cellDate,pct,cnt});
    }
    cols.push(col);
  }
  const colorFor=pct=>{
    if(pct<=0)return t.SB;
    if(pct<0.34)return t.AC+'33';
    if(pct<0.67)return t.AC+'77';
    if(pct<1)return t.AC+'AA';
    return t.AC;
  };
  const MO=ST.lang==='am'?MONTHS_AM:MONTHS_EN;
  let lastMonth=-1;
  const monthLabels=cols.map(col=>{
    const first=col.find(c=>c);
    if(!first)return'';
    const m=first.date.getMonth();
    if(m!==lastMonth){lastMonth=m;return MO[m];}
    return'';
  });
  return div({style:{background:t.CARD,borderRadius:'20px',padding:'18px',marginBottom:'14px'}},[
    div({style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}},L('heatTitle')),
    div({style:{overflowX:'auto',paddingBottom:'4px'}},[
      div({style:{display:'flex',flexDirection:'column',minWidth:`${(WEEKS+1)*15}px`}},[
        div({style:{display:'flex',gap:'3px',marginBottom:'3px'}},monthLabels.map(lb=>div({style:{width:'12px',fontSize:'8px',color:t.DM,flexShrink:'0'}},lb))),
        div({style:{display:'flex',gap:'3px'}},cols.map(col=>div({style:{display:'flex',flexDirection:'column',gap:'3px'}},
          col.map(c=>div({title:c?`${dk(c.date)}: ${c.cnt}`:'',style:{width:'12px',height:'12px',borderRadius:'3px',background:c?colorFor(c.pct):'transparent'}}))
        ))),
      ]),
    ]),
    div({style:{display:'flex',alignItems:'center',gap:'6px',marginTop:'12px',fontSize:'9px',color:t.DM}},[
      L('heatLess'),
      ...[0,0.2,0.5,0.8,1].map(p=>div({style:{width:'10px',height:'10px',borderRadius:'2px',background:colorFor(p)}})),
      L('heatMore'),
    ]),
  ]);
}

// ── CHARTS ────────────────────────────────────────────────────────
function buildCharts(){
  const t=T();
  const days=ST.chartRange==='weekly'?7:30;
  const DS=ST.lang==='am'?DAYS_S_AM:DAYS_S_EN;
  const data=Array.from({length:days}).map((_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(days-1-i));
    const k=dk(d);
    return{label:ST.chartRange==='weekly'?DS[d.getDay()]:String(d.getDate()),pct:ST.habits.length?Math.round(((ST.logs[k]||[]).length/ST.habits.length)*100):0,xp:ST.xpLog[k]||0};
  });
  const maxXp=Math.max(1,...data.map(d=>d.xp));

  return div({},[
    buildHeatmap(),
    div({style:{background:t.CARD,borderRadius:'20px',padding:'18px',marginBottom:'14px'}},[
      div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}},[
        div({style:{fontSize:'14px',fontWeight:'700'}},`📈 ${L('charts')}`),
        div({style:{display:'flex',gap:'6px',background:t.SB,borderRadius:'10px',padding:'3px'}},[
          btn({style:{padding:'5px 12px',borderRadius:'8px',border:'none',fontSize:'11px',cursor:'pointer',background:ST.chartRange==='weekly'?t.AC:'transparent',color:ST.chartRange==='weekly'?'#0D0D0D':t.DM,fontWeight:'600'},onclick(){ST.chartRange='weekly';render();}},L('weekly')),
          btn({style:{padding:'5px 12px',borderRadius:'8px',border:'none',fontSize:'11px',cursor:'pointer',background:ST.chartRange==='monthly'?t.AC:'transparent',color:ST.chartRange==='monthly'?'#0D0D0D':t.DM,fontWeight:'600'},onclick(){ST.chartRange='monthly';render();}},L('monthly')),
        ]),
      ]),
      div({style:{fontSize:'12px',fontWeight:'600',marginBottom:'8px',color:t.DM}},L('completion')),
      div({style:{display:'flex',gap:ST.chartRange==='weekly'?'5px':'2px',alignItems:'flex-end',height:'70px',marginBottom:'18px'}},
        data.map(d=>div({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}},[
          div({style:{width:'100%',height:`${Math.max(2,(d.pct/100)*64)}px`,background:d.pct===100?t.AC:d.pct>0?t.AC+'77':t.MU,borderRadius:'3px',transition:'height .3s'}}),
          ST.chartRange==='weekly'?div({style:{fontSize:'9px',color:t.DM}},d.label):null,
        ]))
      ),
      div({style:{fontSize:'12px',fontWeight:'600',marginBottom:'8px',color:t.DM}},L('xpChart')),
      div({style:{display:'flex',gap:ST.chartRange==='weekly'?'5px':'2px',alignItems:'flex-end',height:'60px'}},
        data.map(d=>div({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}},[
          div({style:{width:'100%',height:`${Math.max(2,(d.xp/maxXp)*54)}px`,background:'#A78BFA88',borderRadius:'3px',transition:'height .3s'}}),
          ST.chartRange==='weekly'?div({style:{fontSize:'9px',color:t.DM}},d.label):null,
        ]))
      ),
    ]),
    div({style:{background:t.CARD,borderRadius:'20px',padding:'18px',marginBottom:'14px'}},[
      div({style:{fontSize:'14px',fontWeight:'700',marginBottom:'14px'}},L('advStats')),
      div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},[
        ['✅',L('compRate'),`${compRate()}%`],
        ['🔥',L('longStreak'),String(calcLongest())],
        ['📅',L('bestMonth'),bestMonth()],
        ['📈',L('totalDays'),String(Object.values(ST.logs).filter(a=>a&&a.length>0).length)],
      ].map(([ic,lb,vl])=>div({style:{background:t.SB,borderRadius:'14px',padding:'14px'}},[
        div({style:{fontSize:'22px'}},ic),
        div({style:{fontSize:'17px',fontWeight:'700',color:t.AC,marginTop:'4px'}},vl),
        div({style:{fontSize:'10px',color:t.DM}},lb),
      ]))),
    ]),
  ]);
}

// ── AI COACH ─────────────────────────────────────────────────────
function buildAI(){
  const t=T();
  const str=calcStreak();
  if(!window._aiState)window._aiState={msg:'',loading:false,asked:false};
  const ai=window._aiState;

  async function ask(){
    ai.loading=true;ai.asked=true;render();
    try{
      const sysP=ST.lang==='am'?'አንተ የልማድ አሠልጣኝ ነህ። አጭር፣ ጠንካራ፣ አበረታቺ መልዕክት በአማርኛ ስጥ። ከ3 ዓረፍተ ነገር አትበልጥ። emoji ተጠቀም።':'You are a habit coach. Give a short, strong, motivating message in English. Max 3 sentences. Use emoji.';
      const uMsg=ST.lang==='am'?`ልማዶቼ: ${ST.habits.map(h=>h.name).join(', ')||'ምንም'}. ዛሬ: ${done().length}/${ST.habits.length}. ተከታታይ: ${str} ቀን. XP: ${ST.xp}. አበረታታኝ!`:`My habits: ${ST.habits.map(h=>h.name).join(', ')||'none'}. Today: ${done().length}/${ST.habits.length}. Streak: ${str} days. XP: ${ST.xp}. Motivate me!`;
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,system:sysP,messages:[{role:'user',content:uMsg}]})});
      const data=await r.json();ai.msg=data.content?.[0]?.text||(ST.lang==='am'?'ዛሬም ተጋ! 💪':'Keep going! 💪');
    }catch{ai.msg=ST.lang==='am'?'ዛሬም ተጋ! አንተ ታላቅ ነህ! 💪🔥':'Keep pushing — you\'ve got this! 💪🔥';}
    ai.loading=false;render();
  }

  return div({style:{background:t.CARD,borderRadius:'20px',padding:'20px',marginBottom:'14px'}},[
    div({style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}},`🤖 ${L('aiCoach')}`),
    !ai.asked?btn({style:{width:'100%',padding:'13px',borderRadius:'14px',border:'none',background:t.AC,color:'#0D0D0D',fontWeight:'700',fontSize:'14px'},onclick:ask},L('askCoach')):
    ai.loading?div({style:{color:t.DM,textAlign:'center',padding:'12px',fontSize:'13px'}},`⏳ ${L('thinking')}`):
    div({},[
      div({style:{fontSize:'14px',lineHeight:'1.8',background:t.SB,padding:'14px',borderRadius:'14px',borderLeft:`3px solid ${t.AC}`}},ai.msg),
      btn({style:{marginTop:'10px',padding:'6px 14px',borderRadius:'10px',border:`1px solid ${t.MU}`,background:'transparent',color:t.DM,fontSize:'12px'},onclick(){ai.asked=false;ai.msg='';render();}},L('askAgain')),
    ]),
    ST.lang==='am'?div({style:{fontSize:'10px',color:t.DM,marginTop:'12px',lineHeight:'1.5'}},'ማስታወሻ፦ AI Coach ኢንተርኔት ይፈልጋል (claude.ai API)። ቀሪዎቹ features ሙሉ offline ይሠራሉ።'):
    div({style:{fontSize:'10px',color:t.DM,marginTop:'12px',lineHeight:'1.5'}},'Note: AI Coach requires internet (claude.ai API). All other features work fully offline.'),
  ]);
}

  ]));

  // Notifications
  nodes.push(div({style:{background:t.CARD,borderRadius:'20px',padding:'18px',marginBottom:'12px'}},[
    div({style:{fontSize:'14px',fontWeight:'700',marginBottom:'10px'}},'🔔 '+L('reminder')),
    btn({style:{width:'100%',padding:'11px',borderRadius:'12px',border:`1px solid ${t.AC}`,background:'transparent',color:t.AC,fontWeight:'600',fontSize:'13px'},onclick(){
      if(Notification&&Notification.permission!=='granted')Notification.requestPermission().then(()=>render());
    }},Notification&&Notification.permission==='granted'?L('notifOn'):L('notifBtn')),
  ]));

  // Export / Import
  nodes.push(div({style:{background:t.CARD,borderRadius:'20px',padding:'18px',marginBottom:'12px'}},[
    div({style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}},`☁️ ${L('dataManage')}`),
    div({style:{display:'flex',gap:'10px'}},[
      btn({style:{flex:'1',padding:'11px',borderRadius:'14px',border:`1px solid ${t.AC}`,background:'transparent',color:t.AC,fontWeight:'600',fontSize:'13px'},onclick(){
        const blob=new Blob([JSON.stringify({habits:ST.habits,logs:ST.logs,xp:ST.xp,profile:ST.profile,exported:new Date().toISOString()},null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='limad-backup.json';a.click();
      }},L('export')),
      btn({style:{flex:'1',padding:'11px',borderRadius:'14px',border:`1px solid ${t.MU}`,background:'transparent',color:t.TX,fontWeight:'600',fontSize:'13px'},onclick(){
        const inp=document.createElement('input');inp.type='file';inp.accept='.json';
        inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.habits){ST.habits=d.habits;LS.set('habits',d.habits);}if(d.logs){ST.logs=d.logs;LS.set('logs',d.logs);}if(d.xp!=null){ST.xp=d.xp;LS.set('xp',d.xp);}if(d.profile){ST.profile=d.profile;LS.set('profile',d.profile);}render();}catch{}};r.readAsText(f);};inp.click();
      }},L('import')),
    ]),
    div({style:{fontSize:'10px',color:t.DM,marginTop:'10px',lineHeight:'1.5'}},ST.lang==='am'?'ዳታ phone ላይ localStorage ውስጥ ይቀማጣል። Export ሲያደርጉ JSON ፋይል ያወርዳሉ።':'Data is saved in your phone\'s localStorage. Export creates a JSON backup file.'),
    (()=>{
      if(!window._pdfState)window._pdfState={busy:false};
      const p=window._pdfState;
      return btn({style:{width:'100%',marginTop:'12px',padding:'11px',borderRadius:'14px',border:`1px solid ${t.AC}`,background:'transparent',color:t.AC,fontWeight:'600',fontSize:'13px'},onclick(){
        if(p.busy)return;p.busy=true;render();
        generatePdfReport(ok=>{p.busy=false;showFlash(ok?L('pdfDone'):'✕ Error');render();});
      }},p.busy?L('pdfGen'):L('pdfReport'));
    })(),
  ]));

  // Home / Reset PIN
  nodes.push(div({style:{display:'flex',gap:'10px',marginBottom:'20px'}},[
    btn({style:{flex:'1',padding:'10px 0',borderRadius:'12px',border:`1px solid ${t.MU}`,background:'transparent',color:t.DM,fontSize:'12px'},onclick(){ST.screen='splash';render();}},L('homeBtn')),
    btn({style:{flex:'1',padding:'10px 0',borderRadius:'12px',border:'1px solid #E84747',background:'transparent',color:'#E84747',fontSize:'12px'},onclick(){LS.set('pin',null);ST.hasPin=false;ST.screen='pin';ST.digits=[];render();}},L('resetPin')),
  ]));

  return div({},nodes);
}

// ── Init ─────────────────────────────────────────────────────────
const seen=LS.get('seen');
loadState();
if(!seen){ST.screen='splash';}
else{ST.screen='pin';}
render();
</script>
</body>
</html>
