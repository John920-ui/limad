// ── Service Worker (Offline Cache) ───────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'limad-v1';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll([self.location.pathname]))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    const clone = res.clone();
    caches.open(CACHE).then(c => c.put(e.request, clone));
    return res;
  }).catch(() => caches.match(e.request))));
});
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: './'})
    .then(() => console.log('SW registered'))
    .catch(e => console.log('SW failed (blob SW needs HTTPS):', e));
}

function addTemplate(key){
  const tpl=HABIT_TEMPLATES[key];if(!tpl)return;
  const names=tpl.items[ST.lang]||tpl.items.en;
  const existing=new Set(ST.habits.map(h=>h.name));
  const cat=(ST.lang==='am'?CATS_AM:CATS_EN)[0];
  const added=[];
  names.forEach(n=>{
    if(existing.has(n))return;
    added.push({id:Date.now().toString()+Math.random().toString(36).slice(2,6),name:n,cat,notes:'',reminder:'',schedule:{type:'daily'},createdAt:new Date().toISOString()});
  });
  if(added.length){ST.habits=[...ST.habits,...added];LS.set('habits',ST.habits);}
  haptic(15);
  showFlash(added.length?`✓ ${added.length} ${ST.lang==='am'?'ልማዶች ተጨምረዋል':'habits added'}`:(ST.lang==='am'?'ቀድሞ ተጨምረዋል':'Already added'));
  ST.tab='home';render();
}

function lvlInfo(xp){let l=1,r=xp;while(r>=l*100){r-=l*100;l++;}return{lvl:l,rem:r,need:l*100}}
function calcStreak(){
  let s=0,d=new Date();
  while(true){const k=dk(d);if(ST.logs[k]&&ST.logs[k].length>0){s++;d.setDate(d.getDate()-1);}else if(ST.freezeDates.includes(k)){d.setDate(d.getDate()-1);}else break;}
  return s;
}
function calcLongest(){
  const keys=Object.keys(ST.logs).filter(k=>ST.logs[k]&&ST.logs[k].length>0).sort();
  if(!keys.length)return 0;
  let max=1,cur=1;
  for(let i=1;i<keys.length;i++){
    const[y1,m1,d1]=keys[i-1].split('-').map(Number);
    const[y2,m2,d2]=keys[i].split('-').map(Number);
    const diff=Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/86400000);
    if(diff===1){cur++;max=Math.max(max,cur);}else cur=1;
  }
  return max;
}
function bestMonth(){
  const counts={};
  Object.entries(ST.logs).forEach(([k,v])=>{if(!v||!v.length)return;const[y,m]=k.split('-');const key=`${y}-${m}`;counts[key]=(counts[key]||0)+v.length;});
  const keys=Object.keys(counts);if(!keys.length)return'—';
  const best=keys.reduce((a,b)=>counts[a]>counts[b]?a:b);
  const[y,m]=best.split('-').map(Number);
  return`${(ST.lang==='am'?MONTHS_AM:MONTHS_EN)[m-1]} ${y}`;
}
function compRate(){
  const dates=Object.keys(ST.logs);
  if(!dates.length||!ST.habits.length)return 0;
  const tot=dates.length*ST.habits.length;
  const done=dates.reduce((a,k)=>a+(ST.logs[k]?.length||0),0);
  return Math.round((done/tot)*100);
}
function isScheduledOn(h,d){
  const s=h.schedule;
  if(!s||s.type==='daily')return true;
  const day=d.getDay(); // 0=Sun..6=Sat
  if(s.type==='weekdays')return day>=1&&day<=5;
  if(s.type==='weekends')return day===0||day===6;
  if(s.type==='everyX'){
    const x=Math.max(1,s.x||2);
    const start=h.createdAt?new Date(h.createdAt):d;
    const diff=Math.round((new Date(dk(d)).getTime()-new Date(dk(start)).getTime())/86400000);
    return diff>=0&&diff%x===0;
  }
  return true;
}
function isScheduledToday(h){return isScheduledOn(h,new Date())}
function todayHabits(){return ST.showTodayOnly?ST.habits.filter(isScheduledToday):ST.habits}
function scheduleLabel(h){
  const s=h.schedule;
  if(!s||s.type==='daily')return L('schDaily');
  if(s.type==='weekdays')return L('schWeekdays');
  if(s.type==='weekends')return L('schWeekends');
  if(s.type==='everyX')return`${ST.lang==='am'?'በየ':'every '}${s.x||2}${ST.lang==='am'?' ቀን':' days'}`;
  return'';
}
function countCompletions(start,end){
  let n=0;
  Object.entries(ST.logs).forEach(([k,v])=>{
    if(!v||!v.length)return;
    const[y,m,d]=k.split('-').map(Number);
    const dt=new Date(y,m-1,d);
    if(dt>=start&&dt<=end)n+=v.length;
  });
  return n;
}
function weekRange(){
  const end=new Date();end.setHours(23,59,59,999);
  const start=new Date();start.setDate(start.getDate()-start.getDay());start.setHours(0,0,0,0);
  return{start,end};
}
function monthRange(){
  const end=new Date();end.setHours(23,59,59,999);
  const start=new Date(end.getFullYear(),end.getMonth(),1);
  return{start,end};
}
function yearRange(){
  const end=new Date();end.setHours(23,59,59,999);
  const start=new Date(end.getFullYear(),0,1);
  return{start,end};
}
function buildRing(pct,size,color,muted,label){
  const r=size/2-6,circ=2*Math.PI*r,cx=size/2,cy=size/2;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',String(size));svg.setAttribute('height',String(size));svg.style.transform='rotate(-90deg)';
  const bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx',String(cx));bg.setAttribute('cy',String(cy));bg.setAttribute('r',String(r));
  bg.setAttribute('fill','none');bg.setAttribute('stroke',muted);bg.setAttribute('stroke-width','7');
  const fg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  fg.setAttribute('cx',String(cx));fg.setAttribute('cy',String(cy));fg.setAttribute('r',String(r));
  fg.setAttribute('fill','none');fg.setAttribute('stroke',color);fg.setAttribute('stroke-width','7');
  const clamped=Math.min(1,Math.max(0,pct));
  fg.setAttribute('stroke-dasharray',String(circ));fg.setAttribute('stroke-dashoffset',String(circ*(1-clamped)));
  fg.setAttribute('stroke-linecap','round');fg.style.transition='stroke-dashoffset .5s';
  svg.appendChild(bg);svg.appendChild(fg);
  const wrap=div({style:{position:'relative',width:`${size}px`,height:`${size}px`,flexShrink:'0'}},[svg]);
  wrap.appendChild(div({style:{position:'absolute',inset:'0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:size>70?'15px':'12px',fontWeight:'700',color}},label||`${Math.round(clamped*100)}%`));
  return wrap;
}

function loadJsPDF(){

    if(window.jspdf){res();return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>res();s.onerror=()=>rej(new Error('load fail'));
    document.head.appendChild(s);
  });
}
async function generatePdfReport(onDone){
  try{
    await loadJsPDF();
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF();
    const am=ST.lang==='am';
    let y=20;
    doc.setFontSize(20);doc.text('LIMAD - '+(am?'ወርሃዊ ሪፖርት':'Monthly Report'),14,y);y+=10;
    doc.setFontSize(10);doc.setTextColor(120);doc.text(new Date().toLocaleDateString(),14,y);y+=12;
    doc.setTextColor(0);doc.setFontSize(13);
    const rows=[
      [am?'ስም':'Name',ST.profile.name||'-'],
      [am?'ጠቅላላ XP':'Total XP',String(ST.xp)],
      [am?'ደረጃ':'Level',String(lvlInfo(ST.xp).lvl)],
      [am?'የአሁኑ streak':'Current streak',String(calcStreak())],
      [am?'ምርጥ streak':'Best streak',String(calcLongest())],
      [am?'የማጠናቀቅ መጠን':'Completion rate',compRate()+'%'],
      [am?'ልማዶች ብዛት':'Total habits',String(ST.habits.length)],
      [am?'ምርጥ ወር':'Best month',bestMonth()],
    ];
    rows.forEach(([k,v])=>{doc.text(`${k}:`,14,y);doc.text(String(v),100,y);y+=8;});
    y+=4;
    doc.setFontSize(14);doc.text(am?'ልማዶች':'Habits',14,y);y+=8;
    doc.setFontSize(10);
    ST.habits.forEach(h=>{
      if(y>280){doc.addPage();y=20;}
      doc.text(`• ${h.name} (${h.cat||''}) — ${scheduleLabel(h)}`,14,y);y+=7;
    });
    doc.save(`limad-report-${dk()}.pdf`);
    onDone(true);
  }catch(e){onDone(false);}
}

function playDing(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;o.type='sine';
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    o.start();o.stop(ctx.currentTime+0.4);
  }catch{}
}

// ── Render Engine ────────────────────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(children){
    if(!Array.isArray(children))children=[children];
    children.flat(Infinity).forEach(c=>{
      if(c==null||c===false)return;
      e.appendChild(typeof c==='string'?document.createTextNode(c):c);
    });
  }
  return e;
}
function div(attrs,children){return el('div',attrs,children)}
function btn(attrs,children){return el('button',attrs,children)}
function span(attrs,children){return el('span',attrs,children)}
function inp(attrs){return el('input',attrs)}
function txt(attrs,children){return el('textarea',attrs,children)}

const app=document.getElementById('app');
function render(){
  app.innerHTML='';
  applyThemeBody();
  const c=build();
  if(Array.isArray(c))c.forEach(n=>app.appendChild(n));
  else app.appendChild(c);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    app.querySelectorAll('.lm-bar[data-target]').forEach(el=>{el.style.transition='height .6s cubic-bezier(.2,.8,.2,1)';el.style.height=el.getAttribute('data-target');});
  }));
}
if(typeof document!=='undefined'&&!window._rippleBound){
  window._rippleBound=true;
  document.addEventListener('pointerdown',e=>{
    const b=e.target.closest('button');
    if(!b)return;
    const rect=b.getBoundingClientRect();
    const r=document.createElement('span');
    const size=Math.max(rect.width,rect.height);
    r.className='lm-ripple';
    r.style.width=r.style.height=size+'px';
    r.style.left=(e.clientX-rect.left-size/2)+'px';
    r.style.top=(e.clientY-rect.top-size/2)+'px';
    if(getComputedStyle(b).position==='static')b.style.position='relative';
    b.style.overflow='hidden';
    b.appendChild(r);
    setTimeout(()=>r.remove(),500);
  },{passive:true});
}

// ── HEATMAP (GitHub style) ─────────────────────────────────────────
function buildHeatmap(){
  const t=T();
  const WEEKS=12,DAYSTOT=WEEKS*7;
  const end=new Date();
  const endDow=end.getDay(); // 0=Sun
  const start=new Date(end);start.setDate(start.getDate()-(DAYSTOT-1)-((6-endDow)));
  const cols=[];
  for(let w=0;w<WEEKS+1;w++){
    const col=[];
    for(let dRow=0;dRow<7;dRow++){
      const cellDate=new Date(start);cellDate.setDate(start.getDate()+w*7+dRow);
      if(cellDate>end){col.push(null);continue;}
      const k=dk(cellDate);
      const cnt=(ST.logs[k]||[]).length;
      const pct=ST.habits.length?cnt/ST.habits.length:0;
      col.push({date:cellDate,pct,cnt});
    }
    cols.push(col);
  }
  const colorFor=pct=>{
    if(pct<=0)return t.SB;
    if(pct<0.34)return t.AC+'33';
    if(pct<0.67)return t.AC+'77';
    if(pct<1)return t.AC+'AA';
    return t.AC;
  };
  const MO=ST.lang==='am'?MONTHS_AM:MONTHS_EN;
  let lastMonth=-1;
  const monthLabels=cols.map(col=>{
    const first=col.find(c=>c);
    if(!first)return'';
    const m=first.date.getMonth();
    if(m!==lastMonth){lastMonth=m;return MO[m];}
    return'';
  });
  return div({style:{background:t.CARD,borderRadius:'20px',padding:'18px',marginBottom:'14px'}},[
    div({style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}},L('heatTitle')),
    div({style:{overflowX:'auto',paddingBottom:'4px'}},[
      div({style:{display:'flex',flexDirection:'column',minWidth:`${(WEEKS+1)*15}px`}},[
        div({style:{display:'flex',gap:'3px',marginBottom:'3px'}},monthLabels.map(lb=>div({style:{width:'12px',fontSize:'8px',color:t.DM,flexShrink:'0'}},lb))),
        div({style:{display:'flex',gap:'3px'}},cols.map(col=>div({style:{display:'flex',flexDirection:'column',gap:'3px'}},
          col.map(c=>div({title:c?`${dk(c.date)}: ${c.cnt}`:'',style:{width:'12px',height:'12px',borderRadius:'3px',background:c?colorFor(c.pct):'transparent'}}))
        ))),
      ]),
    ]),
    div({style:{display:'flex',alignItems:'center',gap:'6px',marginTop:'12px',fontSize:'9px',color:t.DM}},[
      L('heatLess'),
      ...[0,0.2,0.5,0.8,1].map(p=>div({style:{width:'10px',height:'10px',borderRadius:'2px',background:colorFor(p)}})),
      L('heatMore'),
    ]),
  ]);
}

// ── CHARTS ────────────────────────────────────────────────────────
function worstWeekday(){
  const DS=ST.lang==='am'?DAYS_AM:DAYS_EN;
  const sums=[0,0,0,0,0,0,0],counts=[0,0,0,0,0,0,0];
  Object.entries(ST.logs).forEach(([k,v])=>{
    if(!v)return;
    const[y,m,d]=k.split('-').map(Number);
    const day=new Date(y,m-1,d).getDay();
    sums[day]+=v.length;counts[day]++;
  });
  const avgs=sums.map((s,i)=>counts[i]?s/counts[i]:null);
  const seen=avgs.map((v,i)=>v==null?Infinity:v);
  if(seen.every(v=>v===Infinity))return'—';
  const worst=seen.indexOf(Math.min(...seen));
  return DS[worst];
}
function monthlyTrend(){
  const now=new Date();
  const cur30={start:new Date(now.getTime()-29*86400000),end:now};
  const prev30={start:new Date(now.getTime()-59*86400000),end:new Date(now.getTime()-30*86400000)};
  const curN=countCompletions(cur30.start,cur30.end),prevN=countCompletions(prev30.start,prev30.end);
  if(prevN===0&&curN===0)return{dir:'flat',pct:0};
  if(prevN===0)return{dir:'up',pct:100};
  const pct=Math.round(((curN-prevN)/prevN)*100);
  return{dir:pct>5?'up':pct<-5?'down':'flat',pct};
}
function successPrediction(){
  const str=calcStreak(),rate=compRate();
  let score=Math.min(100,Math.round(rate*0.6+Math.min(str,20)*2));
  if(!ST.habits.length)score=0;
  return score;
}
function habitCorrelation(){
  if(ST.habits.length<2)return null;
  const dates=Object.keys(ST.logs);
  if(dates.length<3)return null;
  let best=null;
  for(let i=0;i<ST.habits.length;i++){
    for(let j=i+1;j<ST.habits.length;j++){
      const a=ST.habits[i],b=ST.habits[j];
      let both=0,either=0;
      dates.forEach(k=>{
        const v=ST.logs[k]||[];
        const hasA=v.includes(a.id),hasB=v.includes(b.id);
        if(hasA||hasB)either++;
        if(hasA&&hasB)both++;
      });
      if(either<2)continue;
      const rate=both/either;
      if(!best||rate>best.rate)best={a,b,rate};
    }
  }
  if(!best||best.rate<0.4)return null;
  return best;
}
function recordCompletionTime(habitId){
  const k=today();
  const now=new Date();
  ST.logTimes=ST.logTimes||{};
  ST.logTimes[k]=ST.logTimes[k]||{};
  ST.logTimes[k][habitId]=now.getHours()*60+now.getMinutes();
  LS.set('logTimes',ST.logTimes);
}
function avgCompletionTime(){
  const times=[];
  Object.values(ST.logTimes||{}).forEach(day=>Object.values(day).forEach(m=>times.push(m)));
  if(!times.length)return'—';
  const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);
  const hh=String(Math.floor(avg/60)).padStart(2,'0'),mm=String(avg%60).padStart(2,'0');
  return`${hh}:${mm}`;
}
function bestWeekday(){
  const DS=ST.lang==='am'?DAYS_AM:DAYS_EN;
  const sums=[0,0,0,0,0,0,0],counts=[0,0,0,0,0,0,0];
  Object.entries(ST.logs).forEach(([k,v])=>{
    if(!v)return;
    const[y,m,d]=k.split('-').map(Number);
    const day=new Date(y,m-1,d).getDay();
    sums[day]+=v.length;counts[day]++;
  });
  const avgs=sums.map((s,i)=>counts[i]?s/counts[i]:0);
  const best=avgs.indexOf(Math.max(...avgs));
  if(Math.max(...avgs)===0)return'—';
  return DS[best];
}

function buildFocus(){

  const mm=String(Math.floor(f.remaining/60)).padStart(2,'0');
  const ss=String(f.remaining%60).padStart(2,'0');
  const totalSec=Math.max(1,(f.mode==='work'?f.workMin:f.breakMin)*60);
  const pct=1-(f.remaining/totalSec);
  return div({},[
    div({class:'lm-card',style:{background:t.CARD,borderRadius:'22px',padding:'26px 20px',marginBottom:'14px',textAlign:'center'}},[
      div({style:{fontSize:'12px',fontWeight:'700',color:t.DM,marginBottom:'16px',letterSpacing:'1.5px'}},f.mode==='work'?`🧠 ${L('focusWork').toUpperCase()}`:`☕ ${L('focusBreak').toUpperCase()}`),
      div({style:{display:'flex',justifyContent:'center',marginBottom:'18px',animation:f.running?'ringPulse 2s ease-in-out infinite':'none'}},[

    if(am)return str===0&&longest>0?`🩹 ያለፈው ምርጥ streak ${longest} ቀን ነበር። ዛሬ አንድ ትንሽ ልማድ ብቻ ጨርስ፣ ነገ ሁለተኛ ጨምር፣ ቀስ በቀስ ተመለስ።`:`🩹 አሁን ${str} ቀን ተከታታይ ላይ ነህ፣ ይቀጥል!`;
    return str===0&&longest>0?`🩹 Your best streak was ${longest} days. Finish just one small habit today, add another tomorrow — rebuild gradually.`:`🩹 You're on a ${str}-day streak — keep it going!`;
  }
  if(mode==='predict'){
    const pred=successPrediction(),w=worstWeekday();
    return am?`🔮 የ30-ቀን ስኬት ትንበያህ ${pred}% ነው። ${w!=='—'?w+' ላይ ትልቁ አደጋ አለ — ትኩረት ስጥ።':'ተጨማሪ ዳታ ሲኖር ትክክለኛ ትንበያ ይሻሻላል።'}`:`🔮 Your 30-day success prediction is ${pred}%. ${w!=='—'?'Highest risk day is '+w+' — watch out for it.':'More data will sharpen this prediction.'}`;
  }
  if(mode==='challenge'){const list=am?CH_AM:CH_EN;return list[Math.floor(Math.random()*list.length)];}
  return localCoachMessage();
}
function applyAIChallenge(text){
  if(!text)return;
  let c=text.trim().split('\n')[0].replace(/^["'*\-•]+|["'*]+$/g,'').trim();
  if(c.length>140)c=c.slice(0,140)+'…';
  if(!c)return;
  ST.challenge=c;ST.challengeDate=today();ST.challengeDone=false;
  LS.set('challenge',c);LS.set('challengeDate',today());LS.set('challengeDoneDate',null);
}
function buildAI(){
  const t=T();
  if(!window._aiState)window._aiState={mode:null,msg:'',loading:false,asked:false,offline:false,noEndpoint:false};
  const ai=window._aiState;

  async function ask(mode){
    ai.mode=mode;ai.loading=true;ai.asked=true;render();
    if(typeof navigator!=='undefined'&&!navigator.onLine){
      ai.msg=modeLocalFallback(mode);ai.offline=true;ai.loading=false;
      if(mode==='challenge')applyAIChallenge(ai.msg);
      render();return;
    }
    if(!ST.aiEndpoint){
      ai.msg=modeLocalFallback(mode);ai.offline=false;ai.noEndpoint=true;ai.loading=false;
      if(mode==='challenge')applyAIChallenge(ai.msg);
      render();return;
    }
    ai.offline=false;ai.noEndpoint=false;
    try{
      const sysP=modeSystemPrompt(mode);
      const uMsg=habitContext();
      const r=await fetch(ST.aiEndpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:sysP,messages:[{role:'user',content:uMsg}]})});
      const data=await r.json();
      ai.msg=data.content?.[0]?.text||modeLocalFallback(mode);
    }catch{ai.msg=modeLocalFallback(mode);ai.offline=true;}
    ai.loading=false;
    if(mode==='challenge')applyAIChallenge(ai.msg);
    render();
  }

  return div({style:{background:t.CARD,borderRadius:'20px',padding:'20px',marginBottom:'14px'}},[
    div({style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}},`🤖 ${L('aiCoach')}`),
    !ai.asked?div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
      AI_MODES.map(([mode,ic,lk])=>btn({style:{padding:'16px 8px',borderRadius:'16px',border:`1px solid ${t.MU}`,background:t.SB,color:t.TX,textAlign:'center'},onclick(){haptic(10);ask(mode);}},[

        div({style:{fontSize:'11px',fontWeight:'600',lineHeight:'1.3'}},L(lk)),

    ai.loading?div({},[

      div({class:'lm-skeleton',style:{height:'14px',width:'95%',marginBottom:'8px'}}),
      div({class:'lm-skeleton',style:{height:'14px',width:'85%',marginBottom:'8px'}}),
      div({class:'lm-skeleton',style:{height:'14px',width:'60%'}}),
      div({style:{color:t.DM,textAlign:'center',padding:'10px 0 0',fontSize:'11px'}},`⏳ ${L('thinking')}`),
    ]):
    div({},[
      div({style:{fontSize:'14px',lineHeight:'1.8',background:t.SB,padding:'14px',borderRadius:'14px',borderLeft:`3px solid ${t.AC}`}},ai.msg),
      ai.offline?div({style:{fontSize:'10px',color:t.DM,marginTop:'8px',lineHeight:'1.5'}},`📡 ${L('offlineAiNote')}`):null,
      ai.noEndpoint?div({style:{fontSize:'10px',color:t.DM,marginTop:'8px',lineHeight:'1.5'}},ST.lang==='am'?'⚙️ ሙሉ AI ለማግኘት Settings → AI Coach Endpoint ላይ worker URL አስገባ።':'⚙️ For the full AI, add your worker URL in Settings → AI Coach Endpoint.'):null,
      div({style:{display:'flex',gap:'8px',marginTop:'10px'}},[
        btn({style:{flex:'1',padding:'9px',borderRadius:'10px',border:`1px solid ${t.MU}`,background:'transparent',color:t.DM,fontSize:'12px'},onclick(){ai.asked=false;ai.msg='';render();}},'← '+L('aiMenu')),
        btn({style:{flex:'1',padding:'9px',borderRadius:'10px',border:`1px solid ${t.AC}`,background:'transparent',color:t.AC,fontSize:'12px',fontWeight:'600'},onclick(){ask(ai.mode);}},L('askAgain')),

function openMysteryBox(){
  const roll=Math.random();
  if(roll<0.45){
    const amt=10+Math.floor(Math.random()*40);
    ST.coins+=amt;LS.set('coins',ST.coins);
    return{icon:'🪙',text:ST.lang==='am'?`${amt} ኮይን!`:`${amt} coins!`};
  }
  if(roll<0.75){
    const amt=10+Math.floor(Math.random()*30);
    ST.xp+=amt;LS.set('xp',ST.xp);
    return{icon:'⭐',text:`${amt} XP!`};
  }
  if(roll<0.92){
    const locked=Object.keys(THEME_COST).filter(k=>!ST.unlockedThemes.includes(k));
    if(locked.length){
      const th=locked[Math.floor(Math.random()*locked.length)];
      ST.unlockedThemes=[...ST.unlockedThemes,th];LS.set('unlockedThemes',ST.unlockedThemes);
      return{icon:'🎨',text:(ST.lang==='am'?'አዲስ ገጽታ፦ ':'New theme: ')+THEMES[th].n};
    }
  }
  const lockedAv=PREMIUM_AVATARS.filter(([a])=>!ST.unlockedAvatars.includes(a));
  if(lockedAv.length){
    const[av]=lockedAv[Math.floor(Math.random()*lockedAv.length)];
    ST.unlockedAvatars=[...ST.unlockedAvatars,av];LS.set('unlockedAvatars',ST.unlockedAvatars);
    return{icon:av,text:ST.lang==='am'?'አዲስ Avatar!':'New avatar!'};
  }
  const amt=30;ST.coins+=amt;LS.set('coins',ST.coins);
  return{icon:'🪙',text:`${amt} coins!`};
}

// ── AUTO BACKUP (Telegram) ───────────────────────────────────────
function collectBackupData(){
  return{
    habits:ST.habits,logs:ST.logs,xp:ST.xp,coins:ST.coins,profile:ST.profile,goals:ST.goals,
    xpLog:ST.xpLog,unlockedThemes:ST.unlockedThemes,unlockedAvatars:ST.unlockedAvatars,
    claimedBadges:ST.claimedBadges,freezeDates:ST.freezeDates,freezeAvail:ST.freezeAvail,
    theme:ST.theme,lang:ST.lang,exported:new Date().toISOString(),
  };
}
async function sendBackupToTelegram(silent){
  if(!ST.tgToken||!ST.tgChatId){
    if(!silent)showFlash(ST.lang==='am'?'⚙️ መጀመሪያ Bot Token እና Chat ID አስገባ':'⚙️ Add Bot Token and Chat ID first');
    return false;
  }
  try{
    const data=collectBackupData();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const fd=new FormData();
    fd.append('chat_id',ST.tgChatId);
    fd.append('document',blob,`limad-backup-${today()}.json`);
    fd.append('caption',ST.lang==='am'?'🔒 LIMAD ራስ-ሰር ምትኬ':'🔒 LIMAD auto backup');
    const r=await fetch(`https://api.telegram.org/bot${ST.tgToken}/sendDocument`,{method:'POST',body:fd});
    const j=await r.json();
    if(j.ok){
      ST.lastBackupDate=today();LS.set('lastBackupDate',today());
      if(!silent){showFlash('✓ '+(ST.lang==='am'?'ምትኬ ተልኳል!':'Backup sent!'));render();}
      return true;
    }
    if(!silent){showFlash('⚠️ '+(j.description||(ST.lang==='am'?'ስህተት ተፈጥሯል':'Failed')));render();}
    return false;
  }catch{
    if(!silent){showFlash('⚠️ '+(ST.lang==='am'?'ኢንተርኔት ያረጋግጡ':'Check your internet'));render();}
    return false;
  }
}
function maybeAutoBackup(){
  if(!ST.autoBackupOn||!ST.tgToken||!ST.tgChatId)return;
  if(ST.lastBackupDate===today())return;
  if(typeof navigator!=='undefined'&&!navigator.onLine)return;
  sendBackupToTelegram(true);
}

loadState();
if(!seen){ST.screen='splash';}
else{ST.screen='pin';}
render();
maybeAutoBackup();
